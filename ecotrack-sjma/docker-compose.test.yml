# ============================================================================
# DOCKER-COMPOSE.TEST.YML - Services for CI/CD Integration & E2E Tests
# ============================================================================
# Minimal setup with only PostgreSQL + Redis needed for testing
# Used in GitHub Actions workflows for integration and e2e tests

version: '3.8'

services:
  # =========================================================================
  # POSTGRESQL 16 + POSTGIS (Test Database)
  # =========================================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: ecotrack_test
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d ecotrack_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: on-failure

  # =========================================================================
  # REDIS (Test Cache & Sessions)
  # =========================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: on-failure
    command: redis-server --appendonly yes

  # =========================================================================
  # SERVICE-USERS (Authentication & User Management)
  # =========================================================================
  service-users:
    build:
      context: ./services/service-users
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: test_user
      PGPASSWORD: test_pass
      PGDATABASE: ecotrack_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: test_secret_key_for_testing
      PORT: 3001
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # =========================================================================
  # SERVICE-CONTAINERS (Container Management)
  # =========================================================================
  service-containers:
    build:
      context: ./services/service-containers
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: test_user
      PGPASSWORD: test_pass
      PGDATABASE: ecotrack_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3002
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # =========================================================================
  # SERVICE-ROUTES (Routes & Optimization)
  # =========================================================================
  service-routes:
    build:
      context: ./services/service-routes
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: test_user
      PGPASSWORD: test_pass
      PGDATABASE: ecotrack_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3003
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # =========================================================================
  # SERVICE-GAMIFICATIONS (Gamification)
  # =========================================================================
  service-gamifications:
    build:
      context: ./services/service-gamifications
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: test_user
      PGPASSWORD: test_pass
      PGDATABASE: ecotrack_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3004
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # =========================================================================
  # SERVICE-ANALYTICS (Analytics & Metrics)
  # =========================================================================
  service-analytics:
    build:
      context: ./services/service-analytics
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: test_user
      PGPASSWORD: test_pass
      PGDATABASE: ecotrack_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3005
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # =========================================================================
  # SERVICE-IOT (IoT Sensor Data)
  # =========================================================================
  service-iot:
    build:
      context: ./services/service-iot
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: test_user
      PGPASSWORD: test_pass
      PGDATABASE: ecotrack_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3006
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # =========================================================================
  # API-GATEWAY (Main API Entry Point)
  # =========================================================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-users:
        condition: service_healthy
      service-containers:
        condition: service_healthy
      service-routes:
        condition: service_healthy
      service-gamifications:
        condition: service_healthy
      service-analytics:
        condition: service_healthy
      service-iot:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 3000
      SERVICE_USERS_URL: http://service-users:3001
      SERVICE_CONTAINERS_URL: http://service-containers:3002
      SERVICE_ROUTES_URL: http://service-routes:3003
      SERVICE_GAMIFICATIONS_URL: http://service-gamifications:3004
      SERVICE_ANALYTICS_URL: http://service-analytics:3005
      SERVICE_IOT_URL: http://service-iot:3006
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: test_secret_key_for_testing
      LOG_LEVEL: info
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_test_data:
  redis_test_data:

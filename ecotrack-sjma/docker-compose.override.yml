# ============================================================================
# DOCKER-COMPOSE.OVERRIDE.YML - CONFIGURATION DÉVELOPPEMENT (HOT RELOAD)
# ============================================================================
#
# Ce fichier est automatiquement fusionné avec docker-compose.yml
# Il active le hot reload via les volumes et nodemon
#
# COMMANDES:
#   docker compose up -d              # Démarre en mode dev (auto-merge)
#   docker compose logs -f            # Voir les logs en temps réel
#   docker compose down               # Arrêter
#
# Pour utiliser UNIQUEMENT la config production (sans override):
#   docker compose -f docker-compose.yml up -d --build
#
# ============================================================================

services:
  # =========================================================================
  # POSTGRESQL - Override port to avoid local Postgres conflicts
  # =========================================================================
  postgres:
    ports:
      - "5435:5432"

  # =========================================================================
  # API GATEWAY - Mode développement
  # =========================================================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./services/api-gateway/src:/app/src:ro
      - ./services/api-gateway/package.json:/app/package.json:ro
    # Healthcheck plus permissif en dev
    healthcheck:
      interval: 30s
      retries: 10
      start_period: 30s

  # =========================================================================
  # SERVICE-USERS - Mode développement
  # =========================================================================
  service-users:
    build:
      context: ./services/service-users
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      RATE_LIMIT_BYPASS_LOCAL: 'true'
    volumes:
      - ./services/service-users/src:/app/src:ro
      - ./services/service-users/package.json:/app/package.json:ro
      # Persister les avatars uploadés
      - service-users-storage:/app/storage
    # Healthcheck plus permissif en dev
    healthcheck:
      interval: 30s
      retries: 10
      start_period: 30s

  # =========================================================================
  # SERVICE-CONTAINERS - Mode développement
  # =========================================================================
  service-containers:
    build:
      context: ./services/service-containers
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./services/service-containers/src:/app/src:ro
      - ./services/service-containers/test:/app/test:ro
      - ./services/service-containers/package.json:/app/package.json:ro
    # Healthcheck plus permissif en dev
    healthcheck:
      interval: 30s
      retries: 10
      start_period: 30s

  # =========================================================================
  # SERVICE-ROUTES - Mode développement
  # =========================================================================
  service-routes:
    build:
      context: ./services/service-routes
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      KAFKA_BROKERS: kafka:29092
      KAFKAJS_NO_PARTITIONER_WARNING: '1'
    volumes:
      - ./services/service-routes/src:/app/src:ro
      - ./services/service-routes/package.json:/app/package.json:ro
      - ./services/service-routes/index.js:/app/index.js:ro
    # Healthcheck plus permissif en dev
    healthcheck:
      interval: 30s
      retries: 10
      start_period: 30s

  # =========================================================================
  # SERVICE-IOT - Mode développement
  # =========================================================================
  service-iot:
    build:
      context: ./services/service-iot
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./services/service-iot/src:/app/src:ro
      - ./services/service-iot/package.json:/app/package.json:ro
      - ./services/service-iot/index.js:/app/index.js:ro
    # Healthcheck plus permissif en dev
    healthcheck:
      interval: 30s
      retries: 10
      start_period: 30s

  # =========================================================================
  # SERVICE-NOTIFICATION - Fix health check URLs (Docker internal names)
  # =========================================================================
  service-notification-gestionnaire-admin:
    environment:
      SERVICE_API_GATEWAY_URL: http://ecotrack-api-gateway:3000/health
      SERVICE_USERS_URL: http://ecotrack-service-users:3010/health
      SERVICE_CONTAINERS_URL: http://ecotrack-service-containers:3011/health
      SERVICE_ROUTES_URL: http://ecotrack-service-routes:3012/health
      SERVICE_IOT_URL: http://ecotrack-service-iot:3013/health
      SERVICE_GAMIFICATIONS_URL: http://ecotrack-service-gamifications:3014/health
      SERVICE_ANALYTICS_URL: http://ecotrack-service-analytics:3015/health
      HEALTH_CHECK_INTERVAL_MS: "60000"

# ============================================================================
# VOLUMES pour persister les données en dev
# ============================================================================
volumes:
  service-users-storage:
    driver: local

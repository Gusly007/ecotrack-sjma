# ============================================================================
# DOCKER-COMPOSE.PROD.YML - PRODUCTION (VPS DigitalOcean)
# ============================================================================
#
# USAGE:
#   docker compose -f docker-compose.prod.yml up -d        # Démarrer tout
#   docker compose -f docker-compose.prod.yml down         # Arrêter
#   docker compose -f docker-compose.prod.yml logs -f      # Logs
#   docker compose -f docker-compose.prod.yml ps           # Statut
#
# PRÉREQUIS:
#   - Copier .env.production → .env et remplir toutes les valeurs
#   - Droplet recommandé : 4 Go RAM minimum (Kafka est gourmand)
#
# ACCÈS:
#   - Frontend  : http://<IP_VPS>
#   - API       : http://<IP_VPS>:3000
# ============================================================================

services:

  # ==========================================================================
  # POSTGRESQL 16 + POSTGIS
  # ==========================================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: ecotrack-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ecotrack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ecotrack}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecotrack_user} -d ${DB_NAME:-ecotrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # REDIS
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ecotrack-redis
    volumes:
      - redis_data:/data
    networks:
      - ecotrack
    restart: always
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # KAFKA + ZOOKEEPER (requis par service-users, service-iot, service-analytics)
  # ==========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecotrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ecotrack
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecotrack-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ecotrack
    restart: always

  # ==========================================================================
  # MIGRATIONS
  # ==========================================================================
  migrations:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: ecotrack-migrations
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUN_SEEDS: ${RUN_SEEDS:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecotrack
    restart: "no"

  # ==========================================================================
  # API GATEWAY (port 3000)
  # ==========================================================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: ecotrack-api-gateway
    environment:
      GATEWAY_PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      USERS_SERVICE_URL: http://service-users:3010
      CONTAINERS_SERVICE_URL: http://service-containers:3011
      ROUTES_SERVICE_URL: http://service-routes:3012
      IOT_SERVICE_URL: http://service-iot:3013
      GAMIFICATIONS_SERVICE_URL: http://service-gamifications:3014
      ANALYTICS_SERVICE_URL: http://service-analytics:3015
      FRONTEND_URL: ${FRONTEND_URL}
      GATEWAY_RATE_WINDOW_MS: ${GATEWAY_RATE_WINDOW_MS:-60000}
      GATEWAY_RATE_MAX: ${GATEWAY_RATE_MAX:-100}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      service-users:
        condition: service_healthy
      service-routes:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # FRONTEND (port 80)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecotrack-frontend
    environment:
      VITE_API_URL: ${FRONTEND_API_URL}
      NODE_ENV: production
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # SERVICE-USERS (port 3010)
  # ==========================================================================
  service-users:
    build:
      context: ./services/service-users
      dockerfile: Dockerfile
    container_name: ecotrack-service-users
    environment:
      APP_PORT: 3010
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      NODE_ENV: production
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:29092
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@ecotrack.app}
    ports:
      - "3010:3010"
    depends_on:
      migrations:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # SERVICE-CONTAINERS (port 3011)
  # ==========================================================================
  service-containers:
    build:
      context: ./services/service-containers
      dockerfile: Dockerfile
    container_name: ecotrack-service-containers
    environment:
      APP_PORT: 3011
      DATABASE_URL: ${DATABASE_URL}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-ecotrack_user}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-ecotrack}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "3011:3011"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # SERVICE-ROUTES (port 3012)
  # ==========================================================================
  service-routes:
    build:
      context: ./services/service-routes
      dockerfile: Dockerfile
    container_name: ecotrack-service-routes
    environment:
      APP_PORT: 3012
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3012:3012"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # SERVICE-IOT (port 3013)
  # ==========================================================================
  service-iot:
    build:
      context: ./services/service-iot
      dockerfile: Dockerfile
    container_name: ecotrack-service-iot
    environment:
      APP_PORT: 3013
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-ecotrack_user}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-ecotrack}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ecotrack_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-ecotrack}
      MQTT_PORT: 1883
      MQTT_HOST: 0.0.0.0
      ALERT_FILL_LEVEL_CRITICAL: ${ALERT_FILL_LEVEL_CRITICAL:-90}
      ALERT_BATTERY_LOW: ${ALERT_BATTERY_LOW:-20}
      ALERT_SENSOR_TIMEOUT_HOURS: ${ALERT_SENSOR_TIMEOUT_HOURS:-24}
      KAFKA_BROKERS: kafka:29092
      NODE_ENV: production
      REDIS_HOST: redis
    ports:
      - "3013:3013"
      - "1883:1883"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # SERVICE-GAMIFICATIONS (port 3014)
  # ==========================================================================
  service-gamifications:
    build:
      context: ./services/service-gamifications
      dockerfile: Dockerfile
    container_name: ecotrack-service-gamifications
    environment:
      PORT: 3014
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecotrack}
      DB_USER: ${DB_USER:-ecotrack_user}
      DB_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: production
    ports:
      - "3014:3014"
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - ecotrack
    restart: always
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # SERVICE-ANALYTICS (port 3015)
  # ==========================================================================
  service-analytics:
    build:
      context: ./services/service-analytics
      dockerfile: Dockerfile
    container_name: ecotrack-service-analytics
    environment:
      APP_PORT: 3015
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecotrack}
      DB_USER: ${DB_USER:-ecotrack_user}
      DB_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@ecotrack.app}
      REPORTS_DIR: /app/reports
      KAFKA_BROKERS: kafka:29092
      USERS_SERVICE_URL: http://service-users:3010
    ports:
      - "3015:3015"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecotrack
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local

# ============================================================================
# RÉSEAU
# ============================================================================
networks:
  ecotrack:
    driver: bridge

server {
    listen 80;
    server_name sjmaconnect.live www.sjmaconnect.live;
    # Certbot ajoutera ici la redirection HTTPS automatiquement
}

server {
    listen 443 ssl;
    server_name sjmaconnect.live www.sjmaconnect.live;

    # Certbot remplira ces lignes automatiquement
    # ssl_certificate ...
    # ssl_certificate_key ...

    # Frontend (Docker container sur port 8080)
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Gateway (Docker container sur port 3000)
    # /api/auth/login → http://localhost:3000/auth/login
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================================
# GITHUB ACTIONS CI/CD PIPELINE
# ============================================================================
#
# CONCEPT: Automatise lint → test → build → scan à chaque push/PR
#
# TRIGGER: S'exécute sur:
#   - Push sur toutes les branches (feature/*, feat/*, sans préfixe, etc.)
#   - Pull request ouvert/modifié vers toutes les branches
#
# JOBS:
#   1. Code Quality (Lint) - ESLint, indentation, etc.
#   2. Unit Tests - Jest avec couverture
#   3. Security Scan - npm audit (vulnérabilités)
#   4. Build Docker - Construit l'image du service-users
#   5. Test Docker - Lance le conteneur et le valide
#
# RÉSULTAT: PR est "blocked" si un job échoue (protection)
# ============================================================================

name: 'CI/CD Pipeline'

# Déclenche ce workflow
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# Variables env globales pour ce workflow
env:
  REGISTRY: ghcr.io  # GitHub Container Registry (public registry GitHub)

jobs:
  # =========================================================================
  # JOB 1: CODE QUALITY (LINT) - TOUS LES SERVICES
  # =========================================================================
  # Vérifie que le code respecte les normes (indentation, syntax, etc.)
  
  lint:
    name: 'Lint Code - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: ['service-users', 'api-gateway', 'service-containers', 'service-gamifications', 'service-routes','service-iot','service-analytics']    
    steps:
      # Étape 1: Télécharger le code du repo
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      # Étape 2: Installer Node.js
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Étape 3: Installer dépendances
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/${{ matrix.service }}
      
      # Étape 4: Lancer ESLint (si config existe)
      - name: 'Run ESLint'
        run: npx eslint src/ --max-warnings 10 || echo "ESLint not configured"
        working-directory: services/${{ matrix.service }}
        continue-on-error: true

  # =========================================================================
  # JOB 2: UNIT TESTS - SERVICE-USERS SEULEMENT (a des tests)
  # =========================================================================
  # Lance Jest, collecte la couverture de code
  
  test:
    name: 'Unit Tests - service-users'
    runs-on: ubuntu-latest
    
    # Dépend du lint (lint doit réussir en premier)
    needs: lint
    
    services:
      # Service PostgreSQL utilisé durant les tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/service-users
      
      # Lance Jest avec couverture
      - name: 'Run Jest tests'
        run: npm run test:coverage
        working-directory: services/service-users
        env:
          # Base de test dans le service postgres ci-dessus
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
          NODE_ENV: test
          ACCESS_TOKEN_SECRET: test_secret_access
          REFRESH_TOKEN_SECRET: test_secret_refresh
      
      # Upload couverture vers Codecov (optionnel, visualiser la couverture)
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./services/service-users/coverage/coverage-final.json
          flags: unittests
        continue-on-error: true

  # =========================================================================
  # JOB 2B: UNIT TESTS - SERVICE-CONTAINERS
  # =========================================================================
  # Lance Jest pour service-containers avec PostgreSQL + PostGIS
  
  test-containers:
    name: 'Unit Tests - service-containers'
    runs-on: ubuntu-latest
    
    # Dépend du lint
    needs: lint
    
    services:
      # Service PostgreSQL avec PostGIS pour les tests
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/service-containers
      
      # Initialiser le schéma de test
      - name: 'Initialize test database'
        run: |
          PGPASSWORD=test_pass psql -h localhost -U test_user -d ecotrack_test -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          PGPASSWORD=test_pass psql -h localhost -U test_user -d ecotrack_test -f src/db/init-db-pg.sql || echo "Schema init skipped"
        working-directory: services/service-containers
        continue-on-error: true
      
      # Lance Jest avec couverture
      - name: 'Run Jest tests'
        run: npm run test:unit
        working-directory: services/service-containers
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test
          NODE_ENV: test
      
      # Upload couverture
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./services/service-containers/coverage/coverage-final.json
          flags: unittests-containers
        continue-on-error: true

  # =========================================================================
  # JOB 2C: UNIT TESTS - SERVICE-GAMIFICATIONS
  # =========================================================================
  # Lance Jest pour service-gamifications avec PostgreSQL
  
  test-gamifications:
    name: 'Unit Tests - service-gamifications'
    runs-on: ubuntu-latest
    
    needs: lint
    
    services:
      # Service PostgreSQL pour les tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/service-gamifications
      
      # Lance Jest avec couverture
      - name: 'Run Jest tests'
        run: npm run test:coverage
        working-directory: services/service-gamifications
        env:
          NODE_ENV: test
          GAMIFICATIONS_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
          GAMIFICATIONS_AUTO_SCHEMA: true
      
      # Upload couverture
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./services/service-gamifications/coverage/coverage-final.json
          flags: unittests-gamifications
        continue-on-error: true

  # =========================================================================
  # JOB 2D: UNIT TESTS - SERVICE-IOT (NEW!)
  # =========================================================================
  # Lance Jest pour service-iot avec PostgreSQL
  
  test-iot:
    name: 'Unit Tests - service-iot'
    runs-on: ubuntu-latest
    
    needs: lint
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/service-iot
      
      - name: 'Run Jest tests'
        run: npm test
        working-directory: services/service-iot
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
      
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./services/service-iot/coverage/coverage-final.json
          flags: unittests-iot
        continue-on-error: true

  # =========================================================================
  # JOB 2E: UNIT TESTS - SERVICE-ANALYTICS
  # =========================================================================
  # Lance Jest pour service-analytics avec PostgreSQL
  
  test-analytics:
    name: 'Unit Tests - service-analytics'
    runs-on: ubuntu-latest
    
    needs: lint
    
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/service-analytics
      
      - name: 'Run Jest tests'
        run: npm test
        working-directory: services/service-analytics
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
      
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./services/service-analytics/coverage/coverage-final.json
          flags: unittests-analytics
        continue-on-error: true

  # =========================================================================
  # JOB 2F: UNIT TESTS - FRONTEND
  # =========================================================================
  
  test-frontend:
    name: 'Unit Tests - frontend'
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install dependencies'
        run: npm ci
        working-directory: frontend

      - name: 'Run Vitest coverage'
        run: npm run test:coverage
        working-directory: frontend

      - name: 'Upload frontend coverage artifact'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage
          if-no-files-found: warn

  # =========================================================================
  # JOB 2G: INTEGRATION TESTS - PYRAMIDE
  # =========================================================================

  test-integration:
    name: 'Integration Tests - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        include:
          - service: service-containers
            command: npm run test:integration -- --json --outputFile=reports/integration.json
          - service: service-routes
            command: npm run test:integration -- --json --outputFile=reports/integration.json
          - service: service-iot
            command: npm run test:integration -- --json --outputFile=reports/integration.json

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: 'Run integration tests'
        run: |
          mkdir -p reports
          ${{ matrix.command }}
        working-directory: services/${{ matrix.service }}
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test

      - name: 'Upload integration reports'
        uses: actions/upload-artifact@v4
        with:
          name: report-integration-${{ matrix.service }}
          path: services/${{ matrix.service }}/reports/integration.json
          if-no-files-found: warn

  # =========================================================================
  # JOB 2H: END-TO-END TESTS - PYRAMIDE
  # =========================================================================

  test-e2e:
    name: 'E2E Tests - service-containers'
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/service-containers

      - name: 'Run e2e tests'
        run: |
          mkdir -p reports
          npm run test:e2e -- --json --outputFile=reports/e2e.json
        working-directory: services/service-containers
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test

      - name: 'Upload e2e reports'
        uses: actions/upload-artifact@v4
        with:
          name: report-e2e-service-containers
          path: services/service-containers/reports/e2e.json
          if-no-files-found: warn

  # =========================================================================
  # JOB 3: SECURITY SCAN - TOUS LES SERVICES
  # =========================================================================
  # Détecte les vulnérabilités dans les dépendances
  
  security:
    name: 'Security Scan - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: ['service-users', 'api-gateway', 'service-containers', 'service-gamifications', 'service-iot', 'service-analytics','service-routes']
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: services/${{ matrix.service }}
      
      # npm audit = audit des dépendances et génération de rapport JSON
      - name: 'Run npm audit and save report'
        run: |
          mkdir -p reports/security
          npm audit --omit=dev --json > reports/security/npm-audit-${{ matrix.service }}.json || true
        working-directory: services/${{ matrix.service }}
        continue-on-error: true

      - name: 'Upload dependency audit report'
        uses: actions/upload-artifact@v4
        with:
          name: report-dependency-audit-${{ matrix.service }}
          path: services/${{ matrix.service }}/reports/security/npm-audit-${{ matrix.service }}.json
          if-no-files-found: warn

  # =========================================================================
  # JOB 3B: SAST - CODEQL
  # =========================================================================

  security-sast:
    name: 'Security SAST - CodeQL'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Initialize CodeQL'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: 'Autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: 'Analyze with CodeQL'
        uses: github/codeql-action/analyze@v3

  # =========================================================================
  # JOB 3C: DAST - OWASP ZAP BASELINE
  # =========================================================================

  security-dast:
    name: 'Security DAST - OWASP ZAP'
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Start API Gateway stack'
        run: docker compose up -d api-gateway service-users service-containers service-routes service-iot service-analytics postgres redis

      - name: 'Run ZAP Baseline Scan'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000/api-docs/'
          cmd_options: '-a -j -m 5 -T 10'

      - name: 'Upload DAST reports'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-dast-zap
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn
      
      # Optionnel: Snyk scan (si tu as un compte Snyk)
      # - name: 'Run Snyk scan'
      #   run: npx snyk test
      #   working-directory: service-users
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # =========================================================================
  # JOB 4: BUILD DOCKER - TOUS LES SERVICES
  # =========================================================================
  # Construit les images Docker pour tous les services
  
  build:
    name: 'Build Docker - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: service-users
            image-name: ecotrack-service-users
            port: 3010
          - service: api-gateway
            image-name: ecotrack-api-gateway
            port: 3000
          - service: service-containers
            image-name: ecotrack-service-containers
            port: 3011
          - service: service-gamifications
            image-name: ecotrack-service-gamifications
            port: 3014
          - service: service-routes
            image-name: ecotrack-service-routes
            port: 3012
          - service: service-iot
            image-name: ecotrack-service-iot
            port: 3013
          - service: service-analytics
            image-name: ecotrack-service-analytics
            port: 3015
    
    # Attend que tous les tests réussissent
    needs: [test, test-containers, test-gamifications, test-iot, test-analytics, test-frontend, test-integration, test-e2e]
    
    # Permissions pour pousser sur le registry
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      # Setup buildx pour build multi-platform (ARM64, AMD64, etc.)
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3
      
      # Login au GitHub Container Registry (pour pousser l'image)
      - name: 'Log in to Container Registry'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Métadonnées pour le tag de l'image
      - name: 'Extract metadata'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      # Build et push l'image Docker
      - name: 'Build and push Docker image'
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}  # Push sauf en PR
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # JOB 5: TEST DOCKER IMAGE - TOUS LES SERVICES
  # =========================================================================
  # Lance le conteneur Docker construit et valide qu'il démarre
  
  test-docker:
    name: 'Test Docker - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: service-users
            image-name: ecotrack-service-users
            port: 3010
            env-vars: '-e APP_PORT=3010 -e JWT_SECRET=test -e JWT_REFRESH_SECRET=test -e DATABASE_URL=postgresql://test_user:test_pass@172.17.0.1:5432/ecotrack_test'
          - service: api-gateway
            image-name: ecotrack-api-gateway
            port: 3000
            env-vars: '-e GATEWAY_PORT=3000 -e USERS_SERVICE_URL=http://localhost:3010'
          - service: service-gamifications
            image-name: ecotrack-service-gamifications
            port: 3014
            env-vars: '-e PORT=3014 -e DATABASE_URL=postgresql://test_user:test_pass@172.17.0.1:5432/ecotrack_test'
    
    needs: build
    if: github.event_name == 'pull_request'  # Seulement en PR
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3
      
      # Inspect workspace to confirm SQL presence
      - name: 'Inspect workspace'
        run: |
          pwd
          ls -la
          ls -la services
          ls -la services/service-users
          ls -la services/service-users/sql

      # Initialize database schema for service-users
      - name: 'Initialize database schema'
        if: matrix.service == 'service-users'
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          export PGPASSWORD=test_pass
          echo "PWD: $(pwd)" && ls -la
          ls -la services/service-users/sql || true
          psql -h localhost -U test_user -d ecotrack_test -f "$GITHUB_WORKSPACE/services/service-users/sql/EcoTrack.sql"
      
      # Build localement l'image (sans push)
      - name: 'Build Docker image'
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          load: true
          tags: ${{ matrix.image-name }}:test
      
      # Lance le conteneur et teste /health endpoint
      - name: 'Start container and test health'
        run: |
          docker run -d \
            --name test-container \
            -p ${{ matrix.port }}:${{ matrix.port }} \
            ${{ matrix.env-vars }} \
            ${{ matrix.image-name }}:test
          
          # Attendre que le container démarre avec retry
          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -f http://localhost:${{ matrix.port }}/health 2>/dev/null; then
              echo "Container is healthy!"
              break
            fi
            echo "Attempt $i/30 failed, retrying in 2s..."
            sleep 2
          done
          
          # Vérifier une dernière fois
          curl -f http://localhost:${{ matrix.port }}/health || {
            echo "Health check failed. Container logs:"
            docker logs test-container
            exit 1
          }
          
          echo "Health check passed!"
          docker logs test-container
          docker stop test-container

# ============================================================================
# RÉSUMÉ WORKFLOW
# ============================================================================
# 
# Quand tu fais: git push
#   → GitHub Actions détecte le push
#   → Lance tous les jobs en parallèle (lint, test, security, build)
#   → Si l'un échoue, l'image ne se build pas
#   → Résultats visibles dans GitHub "Actions" tab
#
# En production:
#   - CD: l'image "latest" se déploie auto sur K8s
#   - Monitoring alerte si deployment échoue

# Builds the Vite frontend and deploys frontend/dist/ to GitHub Pages.
#
# Default URL:  https://gusly007.github.io/ecotrack-sjma/  (VITE_BASE=/ecotrack-sjma/)
# Custom domain: set a Custom Domain in GitHub Pages settings, then change
#                VITE_BASE below to / — the built assets will use root paths.

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Change to / when using a custom domain (configured in repo → Settings → Pages)
  VITE_BASE: /ecotrack-sjma/
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Vite frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BASE: ${{ env.VITE_BASE }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

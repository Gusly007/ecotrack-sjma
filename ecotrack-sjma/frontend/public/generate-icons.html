<!DOCTYPE html>
<html>
<head><title>Générer icônes PWA</title></head>
<body>
<canvas id="canvas192" width="192" height="192" style="border:1px solid #ccc"></canvas>
<canvas id="canvas512" width="512" height="512" style="border:1px solid #ccc"></canvas>
<script>
  function drawIcon(canvasId, size) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    
    // Background
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, 0, size, size);
    
    // Text
    ctx.fillStyle = 'white';
    ctx.font = `bold ${size/4}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ET', size/2, size/2);
  }
  
  drawIcon('canvas192', 192);
  drawIcon('canvas512', 512);
  
  // Download
  function download(canvasId, filename) {
    const canvas = document.getElementById(canvasId);
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
  
  setTimeout(() => {
    download('canvas192', 'icon-192x192.png');
    setTimeout(() => download('canvas512', 'icon-512x512.png'), 1000);
  }, 500);
</script>
</body>
</html>

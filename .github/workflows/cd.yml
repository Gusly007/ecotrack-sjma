name: CD - Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================================
  # JOB 1 : Build du frontend Vite
  # ============================================================
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecotrack-sjma/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ecotrack-sjma/frontend
        run: npm ci

      - name: Build
        working-directory: ecotrack-sjma/frontend
        # --base positionne le chemin public pour GitHub Pages (/repo-name/)
        run: npm run build -- --base /${{ github.event.repository.name }}/
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ecotrack-sjma/frontend/dist

  # ============================================================
  # JOB 2 : Déploiement sur GitHub Pages
  # ============================================================
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
